; ==========================================================================
; mitm-gui — Production Configuration Example
; ==========================================================================
; This file serves as a template for the encrypted INI configuration.
; Before use, encrypt it with encryptini.exe:
;   encryptini.exe -password=<password> -in=mitm-gui_prd.ini -out=mitm-gui_prd.enc
; ==========================================================================


; --------------------------------------------------------------------------
; [GLOBAL] — Application-wide settings
; --------------------------------------------------------------------------
[GLOBAL]
; Comma-separated list of admin usernames.
Admins = "admin1", "admin2"
; Log level: DEBUG, INFO, WARN, ERROR
log_level = "INFO"
; Log file path. <yyyy-mm-dd> is replaced with the current date.
log_file_path = "C:\mitm-gui\logs\<yyyy-mm-dd>_app.log"


; ==========================================================================
; Topic: HR (Human Resources)
; ==========================================================================

[HR]
; Supported input formats.
INPUT_EXCEL = true
INPUT_CSV   = true
INPUT_ORA-DB = false
INPUT_PG-DB  = false
INPUT_KAFKA  = false

; Audit trail configuration.
audit_log_enabled = true
audit_log_file_path = "C:\mitm-gui\audit_logs\<yyyy-mm-dd>_hr_audit.log"

; Path to JSON Schema for validation.
JSON_SCHEMA_PATH = "C:\mitm-gui\schemas\hr_schema_v1.json"
; Direct upload URL (used when [HR-AUTH] is not configured).
UPLOAD_URL = "http://localhost:8000/api/hr/upload"

[HR-INPUT-EXCEL]
; Default directory for Excel file selection.
DEFAULT_FILE_PATH = "C:\mitm-gui\input\hr_data.xlsx"

[HR-INPUT-CSV]
; Default directory for CSV file selection.
DEFAULT_FILE_PATH = "C:\mitm-gui\input\hr_data.csv"

[HR-INPUT-ORA-DB]
HOST = "localhost"
PORT = 1521
SERVICE_NAME = "orcl"
USERNAME = "db_user"
PASSWORD = "db_password"

[HR-INPUT-KAFKA]
BOOTSTRAP_SERVERS = "localhost:9092"
TOPIC = "hr-topic"
GROUP_ID = "hr-consumer"
KEY = "kafka-api-key"
SECRET = "kafka-api-secret"
security_protocol = "SASL_SSL"
sasl_mechanism = "PLAIN"
auto_offset_reset = "earliest"
; Consumer idle timeout in seconds.
consumer_timeout = 60

[HR-AUTH]
; SaaS provider authentication (two-legged OAuth2).
saas_base_url = "https://saas-provider.example.com"
saas_login = "integration_user"
saas_password = "integration_password"

[HR-UPLOAD]
; Upload endpoint configuration (overrides [HR] UPLOAD_URL when both auth and endpoint are set).
use_proxy = false
proxy_host = "proxy.example.com:8080"
upload_url = "https://saas-provider.example.com/api/employeeimport"
upload_timeout = 120


